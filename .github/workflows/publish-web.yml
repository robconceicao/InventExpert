# Após push no app, republica a web responsiva:
# https://robconceicao.github.io/inventexpert-web/
#
# Requer secret WEB_PAGES_TOKEN (PAT classic com scope "repo" + "workflow"
# ou fine-grained: Actions write no inventexpert-web).
name: Publish web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-web
  cancel-in-progress: true

jobs:
  trigger:
    name: Disparar deploy inventexpert-web
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Deploy GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.WEB_PAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Configure o secret WEB_PAGES_TOKEN no repo InventExpert (PAT com workflow no inventexpert-web)."
            echo "Enquanto isso: Actions → inventexpert-web → Deploy GitHub Pages → Run workflow"
            exit 1
          fi
          # Dispara o workflow de Pages no host da URL pública
          gh workflow run "Deploy GitHub Pages" --repo robconceicao/inventexpert-web
          echo "Deploy da web enfileirado em robconceicao/inventexpert-web"
          gh run list --repo robconceicao/inventexpert-web --workflow "Deploy GitHub Pages" --limit 1
